<!DOCTYPE html>
<html>
<head>
    <title>Test Vendor API</title>
</head>
<body>
    <h1>Vendor API Test</h1>
    <button onclick="testAPI()">Test API</button>
    <pre id="result"></pre>

    <script type="module">
        // Import Firebase
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getAuth, signInWithEmailAndPassword } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';

        const firebaseConfig = {
            apiKey: "AIzaSyAxhNckwPz8G9QipgW8V0BIfrsvssA_Nhk",
            authDomain: "bazarbd-3beb2.firebaseapp.com",
            projectId: "bazarbd-3beb2",
            storageBucket: "bazarbd-3beb2.firebasestorage.app",
            messagingSenderId: "873972284900",
            appId: "1:873972284900:web:e0771f4652f1a2d8c11bf1"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        window.testAPI = async function() {
            const result = document.getElementById('result');
            result.textContent = 'Testing...\n';

            try {
                // Login
                result.textContent += 'Logging in...\n';
                const userCredential = await signInWithEmailAndPassword(auth, 'seller@gmail.com', 'YOUR_PASSWORD');
                const token = await userCredential.user.getIdToken();
                result.textContent += '✅ Logged in\n';
                result.textContent += `Token: ${token.substring(0, 50)}...\n\n`;

                // Test API
                result.textContent += 'Testing /api/vendors/me...\n';
                const response = await fetch(`http://localhost:5000/api/vendors/me?_=${Date.now()}`, {
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Cache-Control': 'no-cache'
                    }
                });

                result.textContent += `Status: ${response.status}\n`;
                const data = await response.json();
                result.textContent += `Response:\n${JSON.stringify(data, null, 2)}`;

                if (response.ok) {
                    result.textContent += '\n\n✅ SUCCESS! API is working!';
                } else {
                    result.textContent += '\n\n❌ FAILED! Got error response';
                }
            } catch (error) {
                result.textContent += `\n\n❌ ERROR: ${error.message}`;
            }
        };
    </script>
</body>
</html>
