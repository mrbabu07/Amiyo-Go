<!doctype html>
<html lang="en">
  <head>

    <!-- Professional Favicon (SVG works in all modern browsers) -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192x192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512x512.png" />
    <link rel="shortcut icon" href="/favicon.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes"
    />

    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#1e7098" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Apple PWA Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Amiyo-Go" />

    <meta name="msapplication-TileColor" content="#1e7098" />
    <meta name="msapplication-TileImage" content="/icons/icon-144x144.png" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- SEO Meta Tags -->
    <meta
      name="description"
      content="Amiyo-Go - Your trusted online shopping destination for fashion, electronics, and more. Shop with confidence, fast delivery, and great deals!"
    />
    <meta
      name="keywords"
      content="online shopping, e-commerce, fashion, electronics, baby products, mobile shopping, PWA, Amiyo-Go"
    />
    <meta name="author" content="Amiyo-Go" />

    <!-- Open Graph Meta Tags -->
    <meta
      property="og:title"
      content="Amiyo-Go - Online Shopping Made Easy"
    />
    <meta
      property="og:description"
      content="Your trusted online shopping destination with the best deals and fast delivery"
    />
    <meta property="og:image" content="https://amiyo-go.vercel.app/icons/icon-512x512.png" />
    <meta property="og:url" content="https://amiyo-go.vercel.app" />
    <meta property="og:type" content="website" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="Amiyo-Go - Online Shopping Made Easy"
    />
    <meta
      name="twitter:description"
      content="Your trusted online shopping destination"
    />
    <meta name="twitter:image" content="https://amiyo-go.vercel.app/icons/icon-512x512.png" />

    <title>Amiyo-Go - Online Shopping Made Easy</title>
  </head>
